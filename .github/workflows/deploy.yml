name: Marketing OS - CD (Self-Hosted Deploy)

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Deploy to Local Ubuntu Server
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment & Variables
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > marketing-os-dashboard/.env
          mkdir -p marketing-os-dashboard/data

      - name: Deploy with Docker Compose
        working-directory: marketing-os-dashboard
        run: |
          docker compose down
          docker compose up --build -d
          
          echo "Aguardando inicialização do container (15s)..."
          sleep 15
          
          # Health Check - Verifica se a porta 3000 responde localmente
          if curl -s -f http://localhost:3000 > /dev/null; then
            echo "✅ Deploy bem-sucedido! O Marketing OS está online."
          else
            echo "❌ Erro Crítico: A aplicação não respondeu após o deploy."
            docker compose logs --tail=50
            exit 1
          fi
          
          docker image prune -f
